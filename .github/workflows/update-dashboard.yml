name: 简知分销日报更新

on:
  schedule:
    - cron: '0 1,3,7,11,14,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Cache browser profiles
        uses: actions/cache@v4
        with:
          path: data/browser_profiles
          key: browser-profiles-${{ github.run_id }}
          restore-keys: browser-profiles-

      - name: Run data export
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python scripts/jianzhi_export_v2.py

      - name: Generate dashboard HTML
        run: python scripts/regenerate_dashboard.py

      - name: Copy dashboard to docs
        run: |
          mkdir -p docs
          cp data/exports/简知分销数据看板.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/index.html data/exports/简知分销数据看板.html data/exports/*/dist_order_*.xlsx data/exports/export_results.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📅 日报更新 $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy docs --project-name=jianzhi-dashboard

      - name: PushPlus WeChat
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOKEN_B: ${{ secrets.PUSHPLUS_TOKEN_B }}
          PUSHPLUS_TOKEN_C: ${{ secrets.PUSHPLUS_TOKEN_C }}
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TIME=$(TZ='Asia/Shanghai' date +'%H:%M')
          for T in "$PUSHPLUS_TOKEN" "$PUSHPLUS_TOKEN_B" "$PUSHPLUS_TOKEN_C"; do
            curl -s -X POST http://www.pushplus.plus/send               -H "Content-Type: application/json"               -d "{"token":"${T}","title":"📊 简知日报 · ${TIME}","content":"<h3>简知分销日报已更新</h3><p><b>日期</b>：${TODAY} &nbsp; <b>时段</b>：${TIME}</p><p>🔗 <a href='https://jianzhi-dashboard.pages.dev'>在线看板（Cloudflare 国内快）</a></p><p>🔗 <a href='https://jnc121314.github.io/jianzhi-dashboard/'>备用链接（GitHub Pages）</a></p>","template":"html"}"
          done
          echo "📲 PushPlus 通知已发送（3人）"

      - name: Summary
        run: |
          echo "## 📊 简知分销日报更新完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cloudflare Pages**: https://jianzhi-dashboard.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "**更新时间": $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
