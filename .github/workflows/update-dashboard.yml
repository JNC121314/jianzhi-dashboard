name: 简知分销日报更新

on:
  schedule:
    # 每天 9/11/15/19/22 点 + 0 点（UTC 对应北京时间+8）
    - cron: '0 1,3,7,11,14,16 * * *'  # UTC: 1=9点, 3=11点, 7=15点, 11=19点, 14=22点, 16=0点
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Cache browser profiles
        uses: actions/cache@v4
        with:
          path: data/browser_profiles
          key: browser-profiles-${{ github.run_id }}
          restore-keys: browser-profiles-

      - name: Run data export (抓取4账号当天数据)
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python scripts/jianzhi_export_v2.py

      - name: Generate dashboard HTML
        run: python scripts/regenerate_dashboard.py

      - name: Commit and push dashboard to docs/
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # 只提交看板 HTML 和数据文件
          git add data/exports/简知分销数据看板.html docs/index.html data/exports/*/dist_order_*.xlsx data/exports/export_results.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📅 日报更新 $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Copy dashboard to docs (Cloudflare Pages root)
          mkdir -p docs
          cp data/exports/简知分销数据看板.html docs/index.html
          # Deploy
          npx --yes wrangler@latest pages deploy docs --project-name=jianzhi-dashboard

      - name: Send PushPlus WeChat notification
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TIME_VAR=$(TZ='Asia/Shanghai' date +'%H:%M')
          ACCOUNTS="无"
          FILE_COUNT=0
          if [ -f data/exports/export_results.json ]; then
            ACCOUNTS=$(python3 -c "import json;d=json.load(open('data/exports/export_results.json'));print(','.join(d.get('accounts',[])))")
            FILE_COUNT=$(python3 -c "import json;d=json.load(open('data/exports/export_results.json'));print(len(d.get('files',[])))")
          fi
          cat > /tmp/pushplus_msg.py << 'PYEOF'
import json, os, requests
today = os.environ['PUSH_TODAY']
time_var = os.environ['PUSH_TIME']
accounts = os.environ['PUSH_ACCOUNTS']
file_count = os.environ['PUSH_FILE_COUNT']
token = os.environ['PUSHPLUS_TOKEN']
content = f"""<h3>简知分销日报已更新</h3>
<p><b>日期</b>：{today}　　<b>时段</b>：{time_var}</p>
<p><b>导出账号</b>：{accounts}（{file_count}个文件）</p>
<hr>
<p>🔗 <a href='https://jianzhi-dashboard.pages.dev'>点击查看在线看板（Cloudflare 国内快）</a></p>
<p>🔗 <a href='https://jnc121314.github.io/jianzhi-dashboard/'>备用链接（GitHub Pages）</a></p>"""
r = requests.post('http://www.pushplus.plus/send', json={
    'token': token,
    'title': f'📊 简知日报 · {time_var}',
    'content': content,
    'template': 'html'
})
print('PushPlus response:', r.status_code, r.text[:100])
PYEOF
          PUSH_TODAY="$TODAY" PUSH_TIME="$TIME_VAR" PUSH_ACCOUNTS="$ACCOUNTS" PUSH_FILE_COUNT="$FILE_COUNT" python3 /tmp/pushplus_msg.py
          echo "📲 PushPlus 微信通知已发送"

      - name: Summary
        run: |
          echo "## 📊 简知分销日报更新完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cloudflare Pages**: https://jianzhi-dashboard.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Pages (备用)**: https://JNC121314.github.io/jianzhi-dashboard/" >> $GITHUB_STEP_SUMMARY
          echo "**更新时间**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/exports/export_results.json ]; then
            echo "**导出文件数**: $(python3 -c 'import json; d=json.load(open("data/exports/export_results.json")); print(len(d["files"]))')" >> $GITHUB_STEP_SUMMARY
            echo "**账号**: $(python3 -c 'import json; d=json.load(open("data/exports/export_results.json")); print(", ".join(d["accounts"]))')" >> $GITHUB_STEP_SUMMARY
          fi
